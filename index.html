<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexTurn — Coming Soon</title>
  <meta name="description" content="NexTurn — the smart game buzzer system. Coming soon.">
  <meta name="theme-color" content="#0F1115">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='2' y='2' width='28' height='28' rx='6' fill='%23C8C8C8' opacity='0.5'/><circle cx='16' cy='14' r='8' fill='white' stroke='%232E8B57' stroke-width='2.5'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F1115;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .stars::before,
    .stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 50% 45%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 35% 75%, rgba(255,255,255,0.5), transparent);
    }

    .stars::after {
      background-image:
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 18% 38%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 32% 88%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 48% 22%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 62% 60%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 78% 85%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 88% 42%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 95% 72%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 42% 5%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 72% 12%, rgba(255,255,255,0.5), transparent);
      animation: twinkle 8s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Spinning device — flat 2D */
    .device-wrapper {
      perspective: 800px;
    }

    .device-icon {
      width: 200px;
      height: 200px;
      animation: spin-y 6s linear infinite;
      filter: drop-shadow(0 0 40px rgba(1, 121, 111, 0.3));
    }

    @keyframes spin-y {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    /* Ambient glow beneath device */
    .glow {
      width: 200px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(1, 121, 111, 0.25) 0%, transparent 70%);
      margin-top: -12px;
      animation: glow-pulse 3s ease-in-out infinite alternate;
    }

    @keyframes glow-pulse {
      0%   { opacity: 0.5; transform: scaleX(0.8); }
      100% { opacity: 1; transform: scaleX(1.2); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #01796F;
    }

    .tagline {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #01796F;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      .device-icon { width: 150px; height: 150px; }
      .glow { width: 150px; }
      h1 { font-size: 2.2rem; }
      .tagline { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="stars"></div>

  <div class="content">
    <div class="device-wrapper">
      <svg class="device-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F0F0F0"/>
            <stop offset="50%" stop-color="#D8D8D8"/>
            <stop offset="100%" stop-color="#C0C0C0"/>
          </linearGradient>
        </defs>
        <!-- Device body -->
        <rect x="2" y="2" width="28" height="28" rx="6" ry="6" fill="url(#bodyGrad)"/>
        <rect x="3" y="3" width="26" height="26" rx="5" ry="5" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
        <!-- Single thick ring with white fill — no bullseye -->
        <circle cx="16" cy="14" r="8" fill="#D8D8D8" stroke="#01796F" stroke-width="2.5"/>
        <!-- Button -->
        <circle cx="24" cy="24" r="2.5" fill="#A8A8A8"/>
      </svg>
    </div>

    <div class="glow"></div>

    <h1>NexTurn</h1>
    <p class="tagline">Coming Soon</p>
  </div>
</body>
</html>
